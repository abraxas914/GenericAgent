<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>GenericAgent</title>
<style>
:root {
  --bg: #fff;
  --text: #111;
  --muted: #666;
  --accent: hsl(220, 80%, 50%);
  --accent-hover: hsl(220, 80%, 44%);
  --error: #d32f2f;
  --border: #e5e5e5;
  --input-bg: #f7f7f8;
  --input-focus: hsl(220, 80%, 50%);
  --btn-secondary-bg: #f5f5f5;
  --btn-secondary-text: #333;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Microsoft YaHei UI", "Helvetica Neue", sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a;
    --text: #eee;
    --muted: #999;
    --accent: hsl(220, 80%, 62%);
    --accent-hover: hsl(220, 80%, 56%);
    --error: #f87171;
    --border: #2e2e2e;
    --input-bg: #252525;
    --input-focus: hsl(220, 80%, 62%);
    --btn-secondary-bg: #2a2a2a;
    --btn-secondary-text: #ccc;
  }
}

* { box-sizing: border-box; margin: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.setup-card {
  width: 100%;
  max-width: 400px;
}

.setup-header {
  margin-bottom: 24px;
}

.setup-title {
  font-size: 1.125rem;
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.setup-title .icon {
  flex-shrink: 0;
  color: var(--accent);
}

.setup-desc {
  font-size: 0.8125rem;
  color: var(--muted);
  line-height: 1.6;
}

.setup-error {
  background: color-mix(in srgb, var(--error) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--error) 25%, transparent);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 20px;
  font-size: 0.8125rem;
  color: var(--error);
  display: none;
}

.setup-error.visible { display: block; }

.field {
  margin-bottom: 16px;
}

.field-label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 5px;
}

.field-label .icon {
  opacity: 0.7;
}

.field-input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--input-bg);
  color: var(--text);
  font-size: 0.8125rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}

.field-input:focus {
  border-color: var(--input-focus);
}

.field-input::placeholder {
  color: var(--muted);
  opacity: 0.7;
}

.field-hint {
  margin-top: 4px;
  font-size: 0.6875rem;
  color: var(--muted);
  opacity: 0.8;
  line-height: 1.4;
}

.actions {
  margin-top: 20px;
}

.btn {
  width: 100%;
  padding: 10px 16px;
  border: none;
  border-radius: 6px;
  font-size: 0.8125rem;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.12s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
}

.detail-toggle {
  margin-top: 20px;
}

.detail-toggle summary {
  font-size: 0.6875rem;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}

.detail-toggle .detail-content {
  margin-top: 6px;
  font-size: 0.6875rem;
  color: var(--muted);
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}
</style>
</head>
<body>
<div class="setup-card">
  <div class="setup-header">
    <h1 class="setup-title" id="title">
      <svg class="icon" width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8.22 1.754a.25.25 0 0 0-.44 0L1.698 13.132a.25.25 0 0 0 .22.368h12.164a.25.25 0 0 0 .22-.368L8.22 1.754Zm-1.763-.707c.659-1.234 2.427-1.234 3.086 0l6.082 11.378A1.75 1.75 0 0 1 14.082 15H1.918a1.75 1.75 0 0 1-1.543-2.575L6.457 1.047Z" fill="none"/><path fill-rule="evenodd" d="M7.5 3.5v1.016a4.5 4.5 0 0 0-2.879 1.456l-.88-.642-.588.809.88.64A4.494 4.494 0 0 0 3.5 8.999h1a3.5 3.5 0 1 1 7 0h1a4.494 4.494 0 0 0-.533-2.12l.88-.64-.588-.809-.88.642A4.5 4.5 0 0 0 8.5 4.516V3.5h-1ZM8 10a1 1 0 1 0 0 2 1 1 0 0 0 0-2Z"/></svg>
      <span id="title-text">连接 GenericAgent</span>
    </h1>
    <p class="setup-desc" id="desc">指定要连接的 GenericAgent 位置。如果你有已使用的 GA 仓库（含记忆和会话历史），可以直接指向它；否则留空将使用安装包内置的版本。</p>
  </div>

  <div class="setup-error" id="error-banner" role="alert"></div>

  <div class="field">
    <label class="field-label" for="projdir" id="label-dir">
      <svg class="icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 14h13a.5.5 0 0 0 .5-.5V4H1v9.5a.5.5 0 0 0 .5.5ZM1.5 2a.5.5 0 0 0-.5.5V3h6.293l-.854-.854A.5.5 0 0 0 6.086 2H1.5Z"/></svg>
      <span>GenericAgent 位置</span>
    </label>
    <input class="field-input" id="projdir" type="text" spellcheck="false" autocomplete="off">
    <div class="field-hint" id="hint-dir">你的 GA 仓库文件夹路径。已有记忆、会话和自定义代码都会保留。</div>
  </div>

  <div class="field">
    <label class="field-label" for="pypath" id="label-py">
      <svg class="icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M0 3.5A1.5 1.5 0 0 1 1.5 2h13A1.5 1.5 0 0 1 16 3.5v9a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 12.5v-9ZM2 5v1h1V5H2Zm3 0v1h7V5H5Z"/></svg>
      <span>Python 解释器</span>
    </label>
    <input class="field-input" id="pypath" type="text" placeholder="python3" spellcheck="false" autocomplete="off">
    <div class="field-hint" id="hint-py">GA 运行所需的 Python。通常为 python3，虚拟环境用户填完整路径。</div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="start-btn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M7.19 1.564a.75.75 0 0 1 .729.015l7.03 4.13a.75.75 0 0 1 0 1.282l-7.03 4.13a.75.75 0 0 1-1.109-.641V2.205a.75.75 0 0 1 .38-.641Z"/></svg>
      <span id="start-btn-text">连接并启动</span>
    </button>
  </div>

  <details class="detail-toggle">
    <summary id="detail-summary">为什么会看到这个页面？</summary>
    <div class="detail-content" id="detail-body">桌面版在启动时未能自动找到可用的 GenericAgent 实例。可能原因：首次安装尚未配置、之前连接的仓库被移动或删除、或 Python 环境变更。填入正确路径后即可恢复。</div>
  </details>
</div>

<script>
const ZH = (navigator.language || '').toLowerCase().startsWith('zh');

if (!ZH) {
  document.getElementById('title-text').textContent = 'Connect to GenericAgent';
  document.getElementById('desc').textContent =
    'Specify which GenericAgent instance to connect. If you have an existing GA repository with memory and session history, point to it directly. Leave empty to use the bundled version.';
  document.querySelector('#label-dir span').textContent = 'GenericAgent location';
  document.getElementById('hint-dir').textContent = 'Path to your GA repository folder. Your memory, sessions, and custom code will be preserved.';
  document.querySelector('#label-py span').textContent = 'Python interpreter';
  document.getElementById('hint-py').textContent = 'Python required by GA. Usually python3; venv users should enter the full path.';
  document.getElementById('start-btn-text').textContent = 'Connect & Start';
  document.getElementById('detail-summary').textContent = 'Why am I seeing this?';
  document.getElementById('detail-body').textContent =
    'The desktop app could not automatically locate a usable GenericAgent instance. This may happen on first install, if a previously linked repository was moved or deleted, or if the Python environment changed. Enter the correct paths to resume.';
  document.documentElement.lang = 'en';
  document.title = 'GenericAgent';
}

const { invoke } = window.__TAURI__.core;
const { getCurrentWindow, Window } = window.__TAURI__.window;
const errorEl = document.getElementById('error-banner');
const btn = document.getElementById('start-btn');
const btnText = document.getElementById('start-btn-text');
const pyInput = document.getElementById('pypath');
const dirInput = document.getElementById('projdir');

invoke('get_config').then(([py, dir]) => {
  if (py) pyInput.value = py;
  if (dir) dirInput.value = dir;
}).catch(() => {});

invoke('get_prepare_error').then(err => {
  if (!err) return;
  const msg = ZH ? '首次安装未完成' : 'First-run setup did not finish';
  showError(msg);
  const detail = document.getElementById('detail-body');
  detail.textContent = err;
  document.querySelector('.detail-toggle').open = true;
}).catch(() => {});

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add('visible');
}

function hideError() {
  errorEl.classList.remove('visible');
}

async function doStart() {
  hideError();
  const pythonPath = pyInput.value.trim() || 'python3';
  const projectDir = dirInput.value.trim();

  if (!projectDir) {
    showError(ZH ? '请指定 GenericAgent 所在位置' : 'Please specify the GenericAgent location');
    return;
  }

  btn.disabled = true;
  btnText.textContent = ZH ? '正在连接…' : 'Connecting…';

  try {
    await invoke('start_bridge_with_config', { pythonPath, projectDir });
    btnText.textContent = ZH ? '已连接' : 'Connected';
    const mainWin = await Window.getByLabel('main');
    if (mainWin) {
      await mainWin.show();
      await mainWin.setFocus();
    }
    const setupWin = getCurrentWindow();
    await setupWin.hide();
  } catch (e) {
    const raw = String(e);
    const friendly = ZH
      ? '连接失败，请检查路径和 Python 环境'
      : 'Connection failed. Please check the path and Python environment.';
    showError(friendly);
    const detail = document.getElementById('detail-body');
    detail.textContent = raw;
    btn.disabled = false;
    btnText.textContent = ZH ? '重试' : 'Retry';
  }
}

btn.addEventListener('click', doStart);
dirInput.addEventListener('keydown', e => { if (e.key === 'Enter') pyInput.focus(); });
pyInput.addEventListener('keydown', e => { if (e.key === 'Enter') doStart(); });

const MAX_LEN = 300;
[pyInput, dirInput].forEach(el => {
  el.addEventListener('input', () => {
    if (el.value.length > MAX_LEN) el.value = el.value.slice(0, MAX_LEN);
  });
  el.addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text') || '';
    const start = el.selectionStart;
    const end = el.selectionEnd;
    const remaining = MAX_LEN - el.value.length + (end - start);
    const insert = text.slice(0, Math.max(0, remaining));
    el.value = el.value.slice(0, start) + insert + el.value.slice(end);
    el.setSelectionRange(start + insert.length, start + insert.length);
  });
});
</script>
</body>
</html>
